<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8f7f2;
      --muted: #c9c3b7;
      --gold: #f4c76a;
      --coral: #ff7b6b;
      --teal: #48d6c4;
      --panel: rgba(16, 22, 30, 0.74);
      --line: rgba(255, 255, 255, 0.2);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 22%, rgba(255, 123, 107, 0.42), transparent 30%),
        radial-gradient(circle at 82% 18%, rgba(72, 214, 196, 0.36), transparent 28%),
        radial-gradient(circle at 50% 88%, rgba(244, 199, 106, 0.28), transparent 34%),
        linear-gradient(135deg, #101820 0%, #182532 46%, #0b1018 100%);
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: 24px;
    }

    nav {
      width: min(920px, 100%);
      margin: 0 auto 24px;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(16, 22, 30, 0.54);
      backdrop-filter: blur(18px);
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 700;
      padding: 10px 16px;
      border-radius: 999px;
      transition: color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    nav a:hover,
    nav a.active {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }

    main {
      width: min(920px, 100%);
      margin: auto;
      padding: clamp(28px, 7vw, 72px);
      border: 1px solid var(--line);
      border-radius: 28px;
      position: relative;
      isolation: isolate;
      background: var(--panel);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(22px);
      text-align: center;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(244, 199, 106, 0.26);
      border-radius: 20px;
      pointer-events: none;
    }

    .kicker {
      margin: 0 0 18px;
      color: var(--gold);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 11vw, 8rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 14px 40px rgba(0, 0, 0, 0.32);
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, var(--gold), var(--coral), var(--teal));
      -webkit-background-clip: text;
      background-clip: text;
    }

    .message {
      max-width: 650px;
      margin: 28px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.3rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }

    .button {
      color: #111820;
      background: linear-gradient(90deg, var(--gold), var(--teal));
      text-decoration: none;
      font-weight: 800;
      padding: 13px 20px;
      border-radius: 999px;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.28);
    }

    .button.secondary {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid var(--line);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 34px;
      text-align: left;
    }

    .tile {
      min-height: 128px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
    }

    .tile strong {
      display: block;
      margin-bottom: 8px;
      color: var(--ink);
    }

    .tile p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    .sparkles i {
      width: 8px;
      height: 8px;
      position: absolute;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 24px currentColor;
      animation: float 5s ease-in-out infinite;
    }

    .sparkles i:nth-child(1) { top: 12%; left: 14%; color: var(--gold); }
    .sparkles i:nth-child(2) { top: 18%; right: 18%; color: var(--teal); animation-delay: 0.9s; }
    .sparkles i:nth-child(3) { right: 12%; bottom: 18%; color: var(--coral); animation-delay: 1.7s; }
    .sparkles i:nth-child(4) { bottom: 16%; left: 20%; color: var(--teal); animation-delay: 2.3s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.65; }
      50% { transform: translateY(-18px) scale(1.35); opacity: 1; }
    }

    @media (max-width: 720px) {
      .page { padding: 16px; }
      nav { border-radius: 22px; flex-wrap: wrap; }
      nav a { flex: 1 1 90px; text-align: center; }
      .info-grid { grid-template-columns: 1fr; }
    }

  </style>
</head>
<body>
  <div class="page">
    <nav aria-label="Site navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a class="active" href="contact.html">Contact</a>
    </nav>
    <main aria-label="Contact page">
      <div class="sparkles" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
      <p class="kicker">Contact</p>
      <h1>Say <span>Hello</span></h1>
      <p class="message">Have an idea, a question, or just want to test the links? This page is ready for your real contact details whenever you want to add them.</p>
      <div class="actions">
        <a class="button" href="mailto:hello@example.com">Email Me</a>
        <a class="button secondary" href="index.html">Back Home</a>
      </div>
    </main>
  </div>
</body>
</html>
